services:
  landing:
    container_name: landing
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Optional: Add environment variables
    environment:
      - NODE_ENV=production
      # - NEXT_PUBLIC_API_URL=http://backend-service:5000/api
      # Optional: Add volumes for persistent data or hot-reloading in development
      # volumes:
      #   - .:/app
      #   - /app/node_modules
    networks:
      - promise-net
networks:
  promise-net:
    external: true
